[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."mockups"]
  timeout = 300

[functions."build-engine"]
  timeout = 300

[functions."prototypes"]
  timeout = 300

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
